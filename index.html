<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Roman Messenger</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        }

        body{

            background:#10141c;
            color:white;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{

            width:92%;
            max-width:420px;

            background:#1c2330;

            border-radius:22px;

            padding:30px;

            text-align:center;

            box-shadow:0 0 30px rgba(0,0,0,.35);

        }

        img{

            width:90px;
            height:90px;

            border-radius:50%;

            margin-bottom:18px;

        }

        h1{

            font-size:30px;
            margin-bottom:10px;

        }

        h2{

            margin-top:15px;
            font-size:24px;

        }

        p{

            opacity:.75;
            margin-top:10px;
            line-height:1.5;

        }

        button{

            width:100%;

            margin-top:30px;

            padding:15px;

            border:none;

            border-radius:16px;

            background:#2AABEE;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

        }

        button:active{

            transform:scale(.98);

        }

    </style>

</head>

<body>

<div class="card">

    <img id="avatar"
         src="https://telegram.org/img/t_logo.png">

    <h1>Roman Messenger</h1>

    <h2 id="name">Загрузка...</h2>

    <p id="username">
        Добро пожаловать!
    </p>

    <button onclick="startMessenger()">
        💬 Открыть мессенджер
    </button>

</div>


<script>

const tg = window.Telegram.WebApp;

tg.ready();

tg.expand();

document.body.style.background =
tg.themeParams.bg_color || "#10141c";

const user = tg.initDataUnsafe.user;

if(user){

    document.getElementById("name").innerHTML =
        user.first_name;

    document.getElementById("username").innerHTML =
        "@" + (user.username || "без username");

    if(user.photo_url){

        document.getElementById("avatar").src =
            user.photo_url;

    }

}
else{

    document.getElementById("name").innerHTML =
        "Roman";

    document.getElementById("username").innerHTML =
        "Открой приложение из Telegram";

}

function startMessenger(){

    alert(
        "Следующим шагом мы откроем список ваших чатов."
    );

}

</script>

</body>

</html>
