<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 viewport-fit=cover">

    <title>Roman Messenger</title>

    <link
        rel="stylesheet"
        href="/static/style.css">

    <link
        rel="stylesheet"
        href="/static/typing.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

    <!-- Авторизация -->

    <div class="card">

        <img
            id="avatar"
            class="avatar"
            src="https://telegram.org/img/t_logo.png"
            alt="Avatar">

        <div class="title">
            Roman Messenger
        </div>

        <div
            id="name"
            class="name">

            Авторизация...

        </div>

        <div
            id="username"
            class="username">

            Проверяем Telegram...

        </div>

        <div
            id="status"
            class="status">

            Подождите...

        </div>

        <button
            id="continue-button"
            disabled>

            💬 Перейти к чатам

        </button>

    </div>


    <!-- Список пользователей -->

    <div
        id="users-screen"
        class="users-screen">

        <div class="users-header">

            <button
                id="back-button"
                class="back-button">

                ←

            </button>

            <h2>

                Пользователи

            </h2>

        </div>

        <div id="users-list">

        </div>

    </div>


    <!-- Экран чата -->

    <div
        id="chat-screen"
        class="chat-screen">

        <div class="chat-header">

            <button
                id="chat-back-button"
                class="back-button">

                ←

            </button>

            <img
                id="chat-avatar"
                class="user-avatar"
                src="https://telegram.org/img/t_logo.png">

            <div>

                <div
                    id="chat-name"
                    class="user-name">

                    Пользователь

                </div>

                <div
                    id="chat-code"
                    class="user-code">

                </div>

            </div>

        </div>

        <div
            id="messages"
            class="messages">

        </div>

        <div class="input-panel">

            <input
                id="message-input"
                type="text"
                placeholder="Введите сообщение...">

            <button
                id="send-button"
                class="send-button">

                ➤

            </button>

        </div>

    </div>

</div>


<script src="/static/app.js"></script>
<script src="/static/typing.js"></script>

</body>

</html>
