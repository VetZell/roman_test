<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0,
        viewport-fit=cover"
    >

    <title>Roman Messenger</title>

    <script src="https://telegram.org/js/telegram-web-app.js?63"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding:
                calc(20px + env(safe-area-inset-top))
                20px
                calc(20px + env(safe-area-inset-bottom));

            display: flex;
            align-items: center;
            justify-content: center;

            background: var(--tg-theme-bg-color, #10141c);
            color: var(--tg-theme-text-color, #ffffff);

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
        }

        .card {
            width: 100%;
            max-width: 430px;
            padding: 28px;

            text-align: center;

            background:
                var(--tg-theme-secondary-bg-color, #1c2330);

            border-radius: 24px;
        }

        .avatar {
            width: 92px;
            height: 92px;

            margin-bottom: 18px;

            border-radius: 50%;
            object-fit: cover;

            background: #2aabee;
        }

        h1 {
            margin: 0 0 22px;
            font-size: 30px;
        }

        h2 {
            margin: 0 0 8px;
            font-size: 25px;
        }

        p {
            margin: 8px 0;
            color:
                var(--tg-theme-hint-color, #aab2c0);
        }

        .status {
            margin-top: 22px;
            padding: 13px;

            border-radius: 14px;

            background: rgba(255, 255, 255, 0.06);
        }

        .success {
            color: #40d17d;
        }

        .error {
            color: #ff6b6b;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 15px;

            border: none;
            border-radius: 15px;

            background:
                var(--tg-theme-button-color, #2aabee);

            color:
                var(--tg-theme-button-text-color, #ffffff);

            font-size: 17px;
            font-weight: 700;

            cursor: pointer;
        }

        button:disabled {
            opacity: 0.55;
            cursor: default;
        }
    </style>
</head>

<body>
    <main class="card">
        <img
            id="avatar"
            class="avatar"
            src="https://telegram.org/img/t_logo.png"
            alt="Аватар"
        >

        <h1>Roman Messenger</h1>

        <h2 id="name">Авторизация...</h2>

        <p id="username">
            Проверяем данные Telegram
        </p>

        <div id="status" class="status">
            Подождите...
        </div>

        <button
            id="continue-button"
            type="button"
            disabled
        >
            💬 Перейти к чатам
        </button>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;

        const nameElement =
            document.getElementById("name");

        const usernameElement =
            document.getElementById("username");

        const avatarElement =
            document.getElementById("avatar");

        const statusElement =
            document.getElementById("status");

        const continueButton =
            document.getElementById("continue-button");

        function showError(message) {
            nameElement.textContent =
                "Ошибка авторизации";

            usernameElement.textContent =
                "Открой Mini App через Telegram";

            statusElement.textContent = message;
            statusElement.className =
                "status error";

            continueButton.disabled = true;
        }

        async function authorize() {
            if (!tg) {
                showError(
                    "Telegram WebApp SDK недоступен."
                );
                return;
            }

            tg.ready();
            tg.expand();

            const initData = tg.initData;

            if (!initData) {
                showError(
                    "Данные Telegram не получены. " +
                    "Открой приложение кнопкой внутри бота."
                );
                return;
            }

            try {
                const response = await fetch(
                    "/api/auth/telegram",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json"
                        },
                        body: JSON.stringify({
                            init_data: initData
                        })
                    }
                );

                const result = await response.json();

                if (!response.ok || !result.ok) {
                    throw new Error(
                        result.detail ||
                        "Авторизация не выполнена"
                    );
                }

                const user = result.user;

                const fullName = [
                    user.first_name,
                    user.last_name
                ]
                    .filter(Boolean)
                    .join(" ");

                nameElement.textContent =
                    fullName || "Пользователь";

                usernameElement.textContent =
    user.username
        ? `@${user.username}`
        : `Telegram ID: ${user.id}`;

                if (user.photo_url) {
                    avatarElement.src =
                        user.photo_url;
                }

                statusElement.textContent =
                    "✓ Личность подтверждена Telegram";

                statusElement.className =
                    "status success";

                continueButton.disabled = false;

                sessionStorage.setItem(
                    "telegram_user",
                    JSON.stringify(user)
                );

            } catch (error) {
                showError(error.message);
            }
        }

        continueButton.addEventListener(
            "click",
            () => {
                tg.HapticFeedback?.impactOccurred(
                    "light"
                );

                alert(
                    "Авторизация готова. " +
                    "Следующим шагом добавим экран чатов."
                );
            }
        );

        authorize();
    </script>
</body>
</html>
