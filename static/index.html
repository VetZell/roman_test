<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Roman Messenger</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>>

<body>
    <main class="card">
        <img
            id="avatar"
            class="avatar"
            src="https://telegram.org/img/t_logo.png"
            alt="Аватар"
        >

        <h1>Roman Messenger</h1>

        <h2 id="name">Авторизация...</h2>

        <p id="username">
            Проверяем данные Telegram
        </p>

        <div id="status" class="status">
            Подождите...
        </div>

        <button
            id="continue-button"
            type="button"
            disabled
        >
            💬 Перейти к чатам
        </button>
        <section id="users-screen" class="users-screen">
    <div class="users-header">
        <button
            id="back-button"
            class="back-button"
            type="button"
        >
            ← Назад
        </button>

        <h2>Пользователи</h2>
    </div>

    <div id="users-list"></div>
</section>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;

        const nameElement =
            document.getElementById("name");

        const usernameElement =
            document.getElementById("username");

        const avatarElement =
            document.getElementById("avatar");

        const statusElement =
            document.getElementById("status");

        const continueButton =
            document.getElementById("continue-button");

        function showError(message) {
            nameElement.textContent =
                "Ошибка авторизации";

            usernameElement.textContent =
                "Открой Mini App через Telegram";

            statusElement.textContent = message;
            statusElement.className =
                "status error";

            continueButton.disabled = true;
        }

        async function authorize() {
            if (!tg) {
                showError(
                    "Telegram WebApp SDK недоступен."
                );
                return;
            }

            tg.ready();
            tg.expand();

            const initData = tg.initData;

            if (!initData) {
                showError(
                    "Данные Telegram не получены. " +
                    "Открой приложение кнопкой внутри бота."
                );
                return;
            }

            try {
                const response = await fetch(
                    "/api/auth/telegram",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json"
                        },
                        body: JSON.stringify({
                            init_data: initData
                        })
                    }
                );

                const result = await response.json();

                if (!response.ok || !result.ok) {
                    throw new Error(
                        result.detail ||
                        "Авторизация не выполнена"
                    );
                }

                const user = result.user;

                const fullName = [
                    user.first_name,
                    user.last_name
                ]
                    .filter(Boolean)
                    .join(" ");

                nameElement.textContent =
                    fullName || "Пользователь";

                usernameElement.textContent =
    user.username
        ? `@${user.username} • ${user.messenger_code}`
        : user.messenger_code;

                if (user.photo_url) {
                    avatarElement.src =
                        user.photo_url;
                }

                statusElement.textContent =
                    "✓ Личность подтверждена Telegram";

                statusElement.className =
                    "status success";

                continueButton.disabled = false;

                sessionStorage.setItem(
                    "telegram_user",
                    JSON.stringify(user)
                );

            } catch (error) {
                showError(error.message);
            }
        }

        continueButton.addEventListener(
            "click",
            () => {
                tg.HapticFeedback?.impactOccurred(
                    "light"
                );

                alert(
                    "Авторизация готова. " +
                    "Следующим шагом добавим экран чатов."
                );
            }
        );

        authorize();
    </script>
</body>
</html>
